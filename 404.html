ntent="@0xLynkos"><meta name="twitter:creator" content="@0xLynkos"><meta name="twitter:title" content="Lynkos"><meta name="twitter:description" content="404 page of Kiran Brahmatewari's macOS-inspired personal website"><meta name="twitter:image" content="https://lynkos.dev/assets/img/favicons-404/favicon.svg"><script src="https://unpkg.com/draggabilly@3/dist/draggabilly.pkgd.min.js"></script></head><body><div class="layer"></div><canvas id="neuro"></canvas><div class="window active"><div class="title-bar"><div class="handle"></div><div class="title-bar-text">Error 404: Page Not Found</div><div class="title-bar-controls"><button aria-label="Minimize"></button> <button aria-label="Maximize"></button> <button aria-label="Close"></button></div></div><div class="window-body"><div class="button-container"><button class="windows00" onclick="window.history.back()" title="Link to go to previous page">Go Back</button> <button class="windows00" onclick='window.location.href="https://lynkos.dev"' title="Link to homepage">Homepage</button></div></div></div><script type="x-shader/x-fragment" id="vertShader">precision mediump float;

      varying vec2 vUv;
      attribute vec2 a_position;

      void main() {
        vUv = .2 * (a_position + 1.);
        gl_Position = vec4(a_position, 0.0, 1.0);
      }</script><script type="x-shader/x-fragment" id="fragShader">precision mediump float;

      varying vec2 vUv;
      uniform float u_time;
      uniform float u_ratio;
      uniform vec2 u_pointer_position;
      uniform float u_scroll_progress;

      vec2 rotate(vec2 uv, float th) {
        return mat2(cos(th), sin(th), -sin(th), cos(th)) * uv;
      }

      float neuro_shape(vec2 uv, float t, float p) {
        vec2 sine_acc = vec2(0.);
        vec2 res = vec2(0.);
        float scale = 8.;

        float cos_rot = cos(1.);
        float sin_rot = sin(1.);
        mat2 rotation_matrix = mat2(cos_rot, sin_rot, -sin_rot, cos_rot);

        for (int j = 0; j < 50; j++) {
          uv = rotation_matrix * uv;
          sine_acc = rotation_matrix * sine_acc;
          vec2 layer = uv * scale + float(j) + sine_acc - t;
          sine_acc += sin(layer);
          res += (.5 + .5 * cos(layer)) / scale;
          scale *= ((j<5?1.2:j<45?1.3:1.35) - .07 * p);
        }
        return res.x + res.y;
      }

      void main() {
        vec2 uv = 2.95 * vUv;
        uv.x *= u_ratio;

        vec2 pointer = vUv - u_pointer_position;
        pointer.x *= u_ratio;
        float p = clamp(length(pointer), 0., 1.);
        p = .05 * pow(1. - p, 2.);

        float t = .0009 * u_time;
        vec3 color = vec3(0.);

        float noise = neuro_shape(uv, t, p);

        noise = 1.05 * pow(noise, 1.);
        noise += pow(noise, 10.);
        noise = max(.0, noise - .5);
        noise *= (1. - length(vUv - .5));

        color = normalize(vec3(0.4, .7 + .0 * cos(3. * u_scroll_progress), .6 + .9 * sin(3. * u_scroll_progress)));
        color = color * noise;

        gl_FragColor = vec4(color, noise);
      }</script><script src="/dist/utilities/404.js"></script></body></html>
